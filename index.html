<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Tic-Tac-Toe</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #141e30, #243b55);
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      text-align: center;
      width: 360px;
    }

    h1 {
      color: white;
      margin-bottom: 15px;
      font-size: 32px;
    }

    .status {
      color: #f1f1f1;
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
    }

    .cell {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 45px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    .cell:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
    }

    .x {
      color: #00e5ff;
    }

    .o {
      color: #ffcc00;
    }

    .reset-btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: #00c6ff;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .reset-btn:hover {
      background: #0072ff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tic-Tac-Toe</h1>

    <div class="status" id="status">
      Player X Turn
    </div>

    <div class="board" id="board">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">
      Restart Game
    </button>
  </div>

  <script>
    const cells = document.querySelectorAll('.cell');
    const statusText = document.getElementById('status');

    let currentPlayer = 'X';
    let gameActive = true;

    const winPatterns = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    cells.forEach(cell => {
      cell.addEventListener('click', cellClicked);
    });

    function cellClicked() {

      if(this.textContent !== '' || !gameActive) {
        return;
      }

      this.textContent = currentPlayer;
      this.classList.add(currentPlayer.toLowerCase());

      checkWinner();
    }

    function checkWinner() {

      let winner = false;

      winPatterns.forEach(pattern => {

        const a = cells[pattern[0]].textContent;
        const b = cells[pattern[1]].textContent;
        const c = cells[pattern[2]].textContent;

        if(a && a === b && b === c) {
          winner = true;
        }
      });

      if(winner) {
        statusText.textContent = `Player ${currentPlayer} Wins!`;
        gameActive = false;
        return;
      }

      let draw = true;

      cells.forEach(cell => {
        if(cell.textContent === '') {
          draw = false;
        }
      });

      if(draw) {
        statusText.textContent = 'Game Draw!';
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusText.textContent = `Player ${currentPlayer} Turn`;
    }

    function resetGame() {

      currentPlayer = 'X';
      gameActive = true;
      statusText.textContent = 'Player X Turn';

      cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('x');
        cell.classList.remove('o');
      });
    }
  </script>

</body>
</html>
